<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <title>asg0</title>
</head>

<body onload="main()">
  <canvas id="example" width="400" height="400">
    Please use a browser that supports canvas
  </canvas>
  <div>
  <label>v1 x:</label>
  <input type="number" id="v1x" value="2.25" step="any">

  <label>v1 y:</label>
  <input type="number" id="v1y" value="2.25" step="any">
</div>

<div>
  <label>v2 x:</label>
  <input type="number" id="v2x" value="2.25" step="any">

  <label>v2 y:</label>
  <input type="number" id="v2y" value="2.25" step="any">

  <button onclick="handleDrawEvent()">Draw</button>
</div>
<div>
  <label>Operation:</label>
  <select id="operation">
    <option value="add">Add</option>
    <option value="sub">Subtract</option>
    <option value="mul">Multiply</option>
    <option value="div">Divide</option>
    <option value="magnitude">Magnitude</option>
    <option value="normalize">Normalize</option>
    <option value="angle">Angle Between</option>
    <option value="area">Area</option>
  </select>

  <label>Scalar:</label>
  <input type="number" id="scalar" value="2" step="any">

  <button onclick="handleDrawOperationEvent()">Compute</button>
</div>

  <script src="lib/cuon-matrix-cse160.js"></script>
  <script src="asg0.js"></script>
</body>
</html>
